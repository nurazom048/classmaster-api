services:
  # ১. PostgreSQL ১৮ (Alpine - Latest & Fast)
  db:
    image: postgres:18-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: classmaster
    ports:
      - "5432:5432"
    volumes:
      # লোকাল ফোল্ডারের বদলে Named Volume ব্যবহার করা হলো পারমিশন ইস্যু এড়াতে
      - pgdata:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ২. pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    user: root
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - ./classmaster_data/pgadmin_data:/var/lib/pgadmin
      - ./classmaster_data:/var/lib/pgadmin/storage/admin_admin.com/backups

  # ৩. MinIO (S3 Object Storage)
  minio:
    image: quay.io/minio/minio:latest
    container_name: local-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./classmaster_data/s3_storage:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  dufs:
    image: sigoden/dufs:latest
    container_name: dufs
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./classmaster_data:/data
    command: /data -A --auth admin:password123@/:rw

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    volumes:
      - ./.cloudflared:/etc/cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    depends_on:
      - api

  # ৫. Node.js API (Your Main App)
  api:
    build: .
    container_name: api
    #user: "1000:1000" # তোমার উবুন্টু ইউজারের পারমিশন 
    env_file:
      - .env
    ports:
      - "4000:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # এখানে postgres-db এর বদলে db দেওয়া হলো
      - DATABASE_URL=postgresql://postgres:1234@db:5432/classmaster?schema=public
      - MINIO_ENDPOINT=http://local-minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET_NAME=classmaster
    restart: always
    depends_on:
      db:
        condition: service_healthy # ডাটাবেজ হেলদি হওয়ার পর API স্টার্ট হবে
    volumes:
      - .:/app
      - /app/node_modules
      - ./classmaster_data/backups:/app/backups
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules
        - action: rebuild
          path: package.json

# Named Volume ডিক্লেয়ার করা হলো
volumes:
  pgdata:
