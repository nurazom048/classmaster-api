version: '3.8'

services:
  # ১. PostgreSQL ১৮ (Alpine - Latest & Fast)
  db:
    image: postgres:18-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: classmaster
    ports:
      - "5432:5432"
    volumes:
      - ./classmaster_data/postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # this will take 30s to start, 

  # ২. pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    user: root
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - ./classmaster_data/pgadmin_data:/var/lib/pgadmin
      - ./classmaster_data:/var/lib/pgadmin/storage/admin_admin.com/backups

  # ৩. MinIO (S3 Object Storage)
  minio:
    image: quay.io/minio/minio:latest
    container_name: local-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./classmaster_data/s3_storage:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  # ৪. Node.js API (Your Main App)
  api:
    build: .
    container_name: api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/classmaster
      - MINIO_ENDPOINT=http://local-minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET_NAME=classmaster
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./classmaster_data/backups:/app/backups # এখানে pg_dump ফাইল জমা হবে
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules
        - action: rebuild
          path: package.json
